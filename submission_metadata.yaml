# AI tools declaration
ai_tools_used:
  - "Claude"
  - "Codex/Codex CLI"

ai_usage_summary: |
  Used Claude for audit review and Codex/Codex CLI for implementation support,
  validation, and repository hardening. No candidate data is sent to an LLM
  during ranking; the timed ranker is deterministic, CPU-only, and reads only
  local frozen lookup files plus the local candidate JSONL.

# Approach summary
methodology_summary: |
  Deterministic rule-based ranker for Redrob's Senior AI Engineer, Founding
  Team role. Base relevance is a weighted sum of career fit, skill fit, and
  education/location fit. Career fit uses frozen manual company/title tiers,
  experience fit, relevant-role tenure, and one shared tenure-pattern module.
  Skill fit rewards production AI, retrieval, embeddings, ranking, and vector
  infrastructure evidence while penalizing weak self-rating/assessment matches.
  Education/location fit favors stronger education tiers and India/Pune/Noida
  availability. Behavioral signals such as notice period, recruiter response,
  activity, GitHub activity, and verified contacts are applied as a
  multiplicative modifier. Honeypot exclusions run before ranking and require
  at least two independent flags.

# Declarations
declarations:
